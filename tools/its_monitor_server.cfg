[server]
# CameraITS result root. You can also set this to a specific CameraITS_* run directory.
results_dir = /tmp

# Running ITS package/tools path. Leave empty if not needed.
ITS_Tools = ~/ITS16_done

# HTTP API port for the dashboard.
port = 8765

# Delay between replayed TC result updates, in seconds.
replay_interval = 0.5
